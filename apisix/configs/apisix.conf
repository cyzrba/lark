# APISIX configuration (YAML)
# Adjust values to match your environment.

deployment:
  role: traditional
  role_traditional:
    config_provider: etcd
  admin:
    allow_admin:
      - "0.0.0.0/0"
    admin_key:
      - name: "admin"
        key: "admin"
        role: admin
    admin_listen:
      ip: 0.0.0.0
      port: 9180
  etcd:
    host:
      - "http://etcd:2379"
    prefix: "/apisix"
    timeout: 30

apisix:
  node_listen: 9080
  enable_admin: true
  enable_http2: true
  ssl:
    enable: true
    listen:
      - port: 9443

