# APISIX configuration (YAML)
# Adjust values to match your environment.

deployment:
  role: traditional
  role_traditional:
    config_provider: etcd

apisix:
  node_listen: 9080
  enable_admin: true
  enable_http2: true
  admin_key:
    - name: "test-admin"
      key: "test-admin-key-please-change"
      role: admin
  admin_listen:
    ip: 0.0.0.0
    port: 9180
  ssl:
    enable: true
    listen:
      - port: 9443

etcd:
  host:
    - "http://etcd:2379"
  prefix: "/apisix"
  timeout: 30
