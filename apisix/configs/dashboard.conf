# APISIX Dashboard configuration (YAML)
# Adjust values to match your environment.

conf:
  listen:
    host: 0.0.0.0
    port: 9000
  etcd:
    endpoints:
      - "http://etcd:2379"
    prefix: "/apisix"
    timeout: 30

authentication:
  secret: "admin"
  expire_time: 3600
  users:
    - username: admin
      password: admin
