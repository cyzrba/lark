syntax = "proto3";

package user;
option go_package = "./user";

message UserProfile {
  int64 uid = 1;
  string name = 2;
  string email = 3;
  string phone = 4;
  int32 status = 5;
  int64 created_at = 6;
  int64 updated_at = 7;
}

message RegisterReq {
  string name = 1;
  string password = 2;
  string email = 3;
  string phone = 4;
}

message RegisterResp {
  UserProfile user = 1;
}

message LoginReq {
  string email = 1;
  string password = 2;
}

message LoginResp {
  UserProfile user = 1;
}

message GetUserDetailReq {
  int64 uid = 1;
}

message GetUserDetailResp {
  UserProfile user = 1;
}

message UpdateUserReq {
  int64 uid = 1;
  string name = 2;
  string email = 3;
  string phone = 4;
  int32 status = 5;
  bool update_status = 6;
  string old_password = 7;
  string new_password = 8;
}

message UpdateUserResp {
  UserProfile user = 1;
}

service UserRpc {
  rpc Register(RegisterReq) returns (RegisterResp);
  rpc Login(LoginReq) returns (LoginResp);
  rpc GetUserDetail(GetUserDetailReq) returns (GetUserDetailResp);
  rpc UpdateUser(UpdateUserReq) returns (UpdateUserResp);
}
