syntax = "proto3";

package user;
option go_package = "./user";


message UserInfo {
    int64 id = 1;
    string name = 2;
    string email = 3;
}

message GetUserInfoReq {
    int64 id = 1;
}

message GetUserInfoResp {
    string id = 1;
    string name = 2;
}

service user-rpc {
    rpc GetUserInfo(GetUserInfoReq) returns (GetUserInfoResp);
}